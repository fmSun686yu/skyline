# ========================================
# 代理节点配置（Proxies）
# ========================================
proxies:
  - name: USA-San Francisco	- Static Native ISP     # 节点名称（可自定义）
    type: socks5                                    # 节点类型，SOCKS5 代理
    dialer-proxy: chain-hop1-entry                  # 拨号代理（可选），如果这个节点需要通过另一个代理连接。

    server: server                                  # 节点服务器地址（域名或 IP）
    port: port                                      # 节点服务器端口

    username: username                              # SOCKS5 验证用户名（如果需要）
    password: password                              # SOCKS5 验证密码（如果需要）

    ip-version: auto                                # IP 协议版本，ipv4 / ipv6 / auto
    udp: true                                       # 是否支持 UDP 转发（重要，视频/游戏需要开启）
    interface-name: eth0                            # 本地网卡绑定（可选，用于多网卡场景）
    tfo: false                                      # TCP Fast Open 开关（提高连接速度，可选）
    mptcp: false                                    # 是否启用多路径 TCP（Multipath TCP，可提升吞吐量）

  # 快速注释：选中多行 → Cmd + /
  # 再次按下 Cmd + / 取消注释

  # - name: "ss"                    # 节点名称，可自定义
  #   type: ss                      # 节点类型，Shadowsocks
  #   server: server                # 节点服务器地址（域名或 IP）
  #   port: 443                     # 节点服务器端口
  #   ip-version: ipv4              # IP 协议版本，ipv4 / ipv6 / auto
  #   udp: true                     # 是否支持 UDP 转发（重要，视频/游戏需要开启）
  #   interface-name: eth0          # 本地网卡绑定（可选，用于多网卡场景）
  #   routing-mark: 1234            # Linux 下用于策略路由的标记（iptables MARK）
  #   tfo: false                    # TCP Fast Open 开关（提高连接速度，可选）
  #   mptcp: false                  # 是否启用多路径 TCP（Multipath TCP，可提升吞吐量）

  #   dialer-proxy: ss1             # 拨号代理（可选），如果这个节点需要通过另一个代理连接。例如 ss 节点通过 ss1 代理访问服务器

# ============================================================
# 节点订阅提供者（Proxy Providers）
# ============================================================
proxy-providers:
  my-subscription-1:                                          # 订阅提供者1
    type: http
    url: https://example.com/proxyproviders/subscription1     # 订阅链接地址
    path: ./proxy_providers/my-subscription-1.yaml            # 本地存储订阅内容的路径，Clash 会自动下载并更新这个文件
    interval: 10800                                           # 每隔10800秒（3小时）更新订阅
    proxy: DIRECT                                             # 更新订阅时使用的代理，DIRECT 表示直连
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600                                           # 每隔600秒测试一次订阅节点的健康状况
      timeout: 5000                                           # 健康检查超时时间，单位毫秒
      lazy: true                                              # 懒惰测试，只有当订阅节点被使用时才进行健康检查，可减少资源消耗
      expected-status: 204                                    # 预期响应状态码，只有当测试 URL 返回这个状态码时才认为节点可用
    override:
      additional-prefix: "[SUB-1]"                            # 给订阅中的所有节点统一添加前缀 "[SUB-1]"

