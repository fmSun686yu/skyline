# ==============================================
# Clash 配置文件
# 适用于:
#   Windows 平台：Clash Party、Clash Verge、FIClash 等
#   macOS 平台：Clash Verge 等
#
# 作者：fmSun686yu
# 版本：v1.0.2
# 日期：5.11.2026
# ==============================================

# 端口配置
port: 7890           # 本地 HTTP 代理端口
socks-port: 7891     # 本地 SOCKS5 代理端口
mixed-port: 7892     # 混合端口（HTTP + SOCKS5 合并端口）（可选）
redir-port: 7893     # Linux / macOS 下的透明代理端口（可选）
tproxy-port: 7894    # Linux TProxy 端口（可选）

allow-lan: false                # 是否允许局域网设备使用代理
bind-address: 127.0.0.1         # 绑定的网络接口，默认所有接口，此处限制为127.0.0.1增强安全

# 运行模式，可选：global、rule、direct
mode: rule                      # 默认规则模式，按规则分流

ipv6: true                      # 是否启用 IPv6

unified-delay: true             # 是否开启全局统一延迟处理（开启可提高测速稳定性）

# GUI 缓存功能
profile:
  store-selected: true          # Stores API selections for strategy groups for use on the next start
  store-fake-ip: true           # Stores the fakeip mapping table, using the original mapping address when the domain connects again

# 配置 Clash Dashboard
external-controller: '127.0.0.1:9090'   # 控制端口，Dashboard 和 REST API 使用
secret: 'your_secret_here'              # 可选：用于 Dashboard 的访问密码

# 日志配置
log-level: info     # 可选：trace / debug / info / warning / error

# TUN 配置（全局透明代理）
tun:
  enable: true                          # 是否开启 TUN 模式（虚拟网卡透明代理）
  stack: system                         # 使用的 TUN 栈类型：system（系统默认），macOS/Windows 一般用 system
  mtu: 3000                             # TUN 网卡 MTU（最大传输单元），可提高大流量传输性能

# ========================================
# DNS 配置
# ========================================
dns:
  enable: true                          # 是否启用 Clash 内置 DNS 解析
  cache-algorithm: arc                  # DNS 缓存算法，可选 lru / arc（ARC 更智能，高性能）
  use-hosts: true                       # 是否启用 hosts 文件中自定义域名
  use-system-hosts: false               # 是否使用系统 hosts 文件（Windows/macOS/Linux）
  respect-rules: true                   # 是否让 DNS 解析遵循 Clash 规则（true: 按规则分流解析）
  listen: 0.0.0.0:1053                  # DNS 监听端口，0.0.0.0 表示所有网络接口
  ipv6: true                            # 是否解析 IPv6 地址
  
  # 高级模式，可选 fake-ip / redir-host
  # fake-ip: 给域名分配虚拟 IP，配合 TUN 或规则分流使用
  # redir-host: 按域名代理流量，不使用虚拟 IP
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16          # fake-ip 虚拟 IP 段，用于映射域名
  fake-ip-range6: fdfe:dcba:9876::1/64  # IPv6 fake-ip 段（可选）
  fake-ip-filter-mode: blacklist        # fake-ip 过滤模式：blacklist 或 whitelist
  fake-ip-filter:                       # fake-ip 过滤列表
    - '*.lan'                           # 匹配 *.lan 域名，不使用 fake-ip
    - 'time.windows.com'
    - 'time.apple.com'
    - 'time.asia.apple.com'
    - 'time.nist.gov'
    - 'stun.*.*.*'                      # STUN 服务，不使用 fake-ip
    - 'stun.*.*'                        # STUN 服务，不使用 fake-ip
    - '*.ntp.org.cn'                    # 中国 NTP 时间同步服务，不使用 fake-ip
    - '*.openwrt.pool.ntp.org'          # OpenWrt NTP 时间同步，不使用 fake-ip
    - 'time1.cloud.tencent.com'         # 腾讯云 NTP，不使用 fake-ip
    - 'time.ustc.edu.cn'                # 中国科技大学 NTP
    - 'pool.ntp.org'                    # 全球 NTP 池
    - 'ntp.ubuntu.com'                  # Ubuntu 时间同步
