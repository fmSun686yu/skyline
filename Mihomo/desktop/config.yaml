# ========================================
# 策略组（Proxy Groups）
# ========================================
proxy-groups:
  - name: chain-hop2-exit                           # 链式代理第2跳节点，出口节点
    type: select                                    # 手动选择节点
    proxies:
      - USA-San Francisco	- Static Native ISP

  - name: chain-hop1-entry                          # 链式代理第1跳节点，入口节点
    type: select                                    # 手动选择节点
    proxies:
      - Manually Select Nodes
      - Auto Select Nodes
      - Fallback
      
# =========================================================================================

  - name: Manually Select Nodes
    type: select                                    # 手动选择节点
    proxies:
    use:
      # - my-subscription-1
      - my-subscription-2
      - my-subscription-3
      # - my-subscription-4
      # - my-subscription-5
      # - my-subscription-6

  - name: Auto Select Nodes
    type: url-test                                  # 自动选择延迟最低的节点
    url: https://www.gstatic.com/generate_204
    interval: 600                                   # 每隔600秒测试一次
    tolerance: 50                                   # 切换容忍度，单位毫秒。例如 tolerance: 50 表示新节点至少比当前节点快约 50ms 才更容易切换，可以减少频繁跳节点的情况，提供更稳定的体验。
    lazy: true                                      # 懒惰测试，只有该组被使用时才进行测试，可减少资源消耗
    expected-status: 204                            # 预期响应状态码，只有当测试 URL 返回这个状态码时才认为节点可用
    proxies:
    use:
      # - my-subscription-1
      - my-subscription-2
      - my-subscription-3
      # - my-subscription-4
      # - my-subscription-5
      # - my-subscription-6

  - name: Fallback
    type: fallback                                  # 自动回退：当前节点不可用时，自动切换到下一个可用节点
    url: https://www.gstatic.com/generate_204
    interval: 600                                   # 每隔600秒测试一次
