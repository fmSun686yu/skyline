    expected-status: 204                            # 预期响应状态码，只有当测试 URL 返回这个状态码时才认为节点可用
    proxies:
    use:
      # - my-subscription-1
      - my-subscription-2
      - my-subscription-3
      # - my-subscription-4
      # - my-subscription-5
      # - my-subscription-6

