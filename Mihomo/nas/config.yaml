# ============================================================
# 规则集提供者（Rule Providers）
# 作用：
#   用于从远程或本地加载规则集，避免在 rules 中手写大量网站规则。
#
# 使用方式：
#   1. 先在 rule-providers 中定义规则集；
#   2. 再在 rules 中用 RULE-SET 引用对应规则集。
#
# 2026年热门常用的 rule-providers：
#   1. MetaCubeX / meta-rules-dat
#   2. blackmatrix7 / ios_rule_script
#   3. Loyalsoldier / clash-rules
#      Loyalsoldier / v2ray-rules-dat
#   4. ACL4SSR / ACL4SSR
#   5. DustinWin / ruleset_geodata
#   6. SukkaW / Surge
#      SukkaLab / ruleset.skk.moe
#   7. dler-io / Rules
#   8. ClashConnectRules / Self-Configuration
#   9. TG-Twilight / AWAvenue-Ads-Rule
#   10. privacy-protection-tools / anti-AD
# ============================================================
rule-providers:
  # ========================================
  # 局域网 / 私有地址规则集
  # ========================================
  private_domain:
    type: http
    behavior: domain
    format: mrs
    interval: 28800                                   # 每隔28800秒（8小时）更新规则集
    path: ./rule-providers/private_domain.mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs  # 远程规则集 URL

  private_ip:
    type: http
    behavior: ipcidr
    format: mrs
    interval: 28800                                   # 每隔28800秒（8小时）更新规则集
    path: ./rule-providers/private_ip.mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs    # 远程规则集 URL

  # ========================================
  # 非中国 AI 服务规则集（ChatGPT、Gemini、Grok 等）
  # ========================================
  ai_non_cn:
    type: http
    behavior: domain
    format: mrs
    interval: 28800                                   # 每隔28800秒（8小时）更新规则集
    path: ./rule-providers/ai_services_non_cn.mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ai-!cn.mrs   # 远程规则集 URL

  # ========================================
  # Apple 服务规则集（App Store、iCloud、Apple Music 等）
  # ========================================
  apple_cn_domain:
    type: http
    behavior: domain
    format: mrs
    interval: 28800                                   # 每隔28800秒（8小时）更新规则集
    path: ./rule-providers/apple_cn_domain.mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/apple-cn.mrs

  apple_domain:
    type: http
    behavior: domain
    format: mrs
    interval: 28800                                   # 每隔28800秒（8小时）更新规则集
    path: ./rule-providers/apple_domain.mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/apple.mrs

  # ========================================
  # Microsoft 服务规则集（Windows Update、Office 365、Xbox Live 等）
  # ========================================
  onedrive:
    type: http
    behavior: domain
    format: mrs
