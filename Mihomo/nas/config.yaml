# -------------------------------------------------
# 路由规则
# 官方文档说明：规则从上到下匹配，越靠上优先级越高
# -------------------------------------------------
rules:
  # ===============================
  # 局域网 / 私有地址直连
  # ===============================
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve

  # ===============================
  # 非中国 AI 服务分流（ChatGPT、Gemini、Grok 等）
  # ===============================
  - RULE-SET,ai_non_cn,AI_non_cn

  # ===============================
  # Apple 服务分流（App Store、iCloud、Apple Music 等）
  # ===============================
  - RULE-SET,apple_cn_domain,DIRECT
  - RULE-SET,apple_domain,Apple

  # ===============================
  # Microsoft 服务分流（Windows Update、Office 365、Xbox Live
  # ===============================
  - RULE-SET,onedrive,OneDrive
  - RULE-SET,github,GitHub
  - RULE-SET,microsoft,Microsoft

  # ===============================
  # Google 服务分流
  # ===============================
  - RULE-SET,youtube,YouTube
  - RULE-SET,google_domain,Google
  - RULE-SET,google_ip,Google,no-resolve

  # ===============================
  # Telegram 服务分流
  # ===============================
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,telegram_ip,Telegram,no-resolve

  # ===============================
  # X / Twitter 服务分流
  # ===============================
  - RULE-SET,twitter_domain,Twitter
  - RULE-SET,twitter_ip,Twitter,no-resolve

  # ===============================
  # 中国大陆服务直连
  # ===============================
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - RULE-SET,geolocation_cn_domain,DIRECT

  # ===============================
  # 漏网之鱼
  # ===============================
  - MATCH,Manually Select Nodes    


