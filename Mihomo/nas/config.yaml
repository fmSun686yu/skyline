# -------------------------------------------------
# 手动添加单个代理节点
# -------------------------------------------------
proxies:
  - name: USA-San Francisco	- Static Native ISP     # 节点名称（可自定义）
    type: socks5                                    # 节点类型，SOCKS5 代理
    dialer-proxy: chain-hop1-entry                  # 拨号代理（可选），如果这个节点需要通过另一个代理连接。

    server: server                                  # 节点服务器地址（域名或 IP）
    port: port                                      # 节点服务器端口

    username: username                              # SOCKS5 验证用户名（如果需要）
    password: password                              # SOCKS5 验证密码（如果需要）

    ip-version: auto                                # IP 协议版本，ipv4 / ipv6 / auto
    udp: true                                       # 是否支持 UDP 转发（重要，视频/游戏需要开启）
    interface-name: eth0                            # 本地网卡绑定（可选，用于多网卡场景）
    tfo: false                                      # TCP Fast Open 开关（提高连接速度，可选）
    mptcp: false                                    # 是否启用多路径 TCP（Multipath TCP，可提升吞吐量）



# -------------------------
# 代理提供者（订阅）
# 说明：
# - Mihomo 格式的节点或支持 *ray 的分享格式
# - 这里建议用 proxy-providers 管理你的机场/节点订阅，你的代理节点通过订阅链接添加
# - 你必须把 url 改成你自己的订阅地址
# -------------------------
proxy-providers:
  my-subscription-1:
    type: http                                                          # 表示通过 HTTP 方式下载订阅内容
    url: https://example.com/proxyproviders/subscription1               # 这里改成你的订阅链接
    path: ./proxy-providers/my-subscription-1.yaml                      # 订阅内容缓存到本地文件
    interval: 43200                                                     # 更新间隔（秒）,43200s = 12h
    proxy: DIRECT                                                       # 拉取订阅时使用该节点
    size-limit: 0                                                       # 下载大小限制，0 表示不限制
    health-check:                                                       # 订阅中的节点自动做延迟检测
      enable: true                                                      # 是否对订阅中的节点进行健康检查/延迟测试
      url: https://www.gstatic.com/generate_204                         # 用于测试连通性的目标 URL
      interval: 300                                                     # 健康检查周期，单位秒
      timeout: 10000                                                    # 单次健康检查超时时间，单位毫秒
      lazy: true                                                        # 懒检测模式，减少不必要的频繁探测
      expected-status: 204
    override:
      additional-prefix: "[SUB-1]"                                      # 给订阅中的所有节点统一添加前缀 "[SUB-1]"
      udp: true                                                         # 是否启用节点的 UDP 转发能力
